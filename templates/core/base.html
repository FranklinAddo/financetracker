<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FinanceTracker – {% block title %}Home{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f4f6f9; }

    .navbar {
      background: #1a3c5e !important;
    }

    .navbar-brand, .nav-link {
      color: #fff !important;
    }

    .nav-link:hover {
      color: #f0c040 !important;
    }

    .card {
      border: none;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      border-radius: 10px;
    }

    .badge-planning   { background:#6c757d; }
    .badge-active     { background:#198754; }
    .badge-on_hold    { background:#ffc107; color:#000; }
    .badge-completed  { background:#0d6efd; }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg mb-4">
  <div class="container">

    <a class="navbar-brand fw-bold" href="/">FinanceTracker</a>

    <div class="d-flex align-items-center ms-auto gap-3">

      {% if user.is_authenticated %}

        <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
        <a class="nav-link" href="{% url 'project_list' %}">Projects</a>
        <a class="nav-link" href="{% url 'department_list' %}">Departments</a>

        {% if user.is_staff %}
          <a class="nav-link" href="/admin/">Admin</a>
        {% endif %}

        <form method="post" action="{% url 'logout' %}" class="m-0">
          {% csrf_token %}
          <button type="submit" class="btn btn-outline-light btn-sm">
            Logout ({{ user.username }})
          </button>
        </form>

      {% else %}

        <a class="nav-link" href="{% url 'login' %}">Login</a>
        <a class="nav-link" href="{% url 'register' %}">Register</a>

      {% endif %}

    </div>

  </div>
</nav>

<div class="container">

  {% for message in messages %}
    <div class="alert alert-success alert-dismissible fade show">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}

  {% block content %}{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
