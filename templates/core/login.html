{% extends 'core/base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card p-4">
      <h3 class="mb-3">Login</h3>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary w-100">Login</button>
      </form>
      <p class="mt-3 text-center">No account? <a href="{% url 'register' %}">Register</a></p>
    </div>
  </div>
</div>
{% endblock %}
