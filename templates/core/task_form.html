{% extends 'core/base.html' %}
{% block title %}{{ action }} Task{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card p-4">
      <h3>{{ action }} Task for: <em>{{ project.title }}</em></h3>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-success">Save Task</button>
        <a href="{% url 'project_detail' project.pk %}" class="btn btn-outline-secondary ms-2">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
